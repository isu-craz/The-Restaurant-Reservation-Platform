<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>

    <script>

        // ==========================================
        // OVERRIDE DEFAULT BROWSER ALERTS WITH TOASTS
        // ==========================================
        window.alert = function(message) {
            const container = document.getElementById('toast-container');
            if (!container) {
                console.log("Alert:", message);
                return;
            }

            const toast = document.createElement('div');

            // Auto-detect if it's an error/warning based on common keywords in the message
            const msgLower = message.toLowerCase();
            const isError = msgLower.includes('fail') || msgLower.includes('invalid') || msgLower.includes('error') ||
                msgLower.includes('overlap') || msgLower.includes('minimum') || msgLower.includes('maximum') ||
                msgLower.includes('must') || msgLower.includes('not found') || msgLower.includes('expired');

            // Base styling
            toast.className = `transform transition-all duration-300 translate-x-full opacity-0 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border text-sm font-semibold max-w-md pointer-events-auto cursor-pointer `;

            if (isError) {
                toast.className += 'bg-white/70 backdrop-blur-md border-red-100 text-red-900';
            } else {
                toast.className += 'bg-gray-900/70 backdrop-blur-md border-gray-800 text-white';
            }

            const iconHTML = isError
                ? `<svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            toast.innerHTML = `${iconHTML} <span>${message}</span>`;

            // Click to dismiss early
            toast.onclick = () => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            };

            container.appendChild(toast);

            // Trigger slide-in animation
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Auto remove after 4 seconds
            setTimeout(() => {
                if(toast.parentElement) {
                    toast.classList.add('opacity-0', 'translate-x-full');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        };

        function checkAuth() {
            if (!localStorage.getItem('restaurantSessionUserId') || localStorage.getItem('restaurantSessionRole') !== 'WAITER') {
                window.location.replace('/login.html');
            }
        }
        checkAuth();
        window.addEventListener('pageshow', function(e) {
            if (e.persisted || (window.performance && window.performance.getEntriesByType && window.performance.getEntriesByType('navigation').length > 0 && window.performance.getEntriesByType('navigation')[0].type === 'back_forward')) {
                checkAuth();
            }
        });
        window.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') checkAuth();
        });
    </script>
</head>
<body class="h-screen w-full bg-gray-50 flex text-slate-900 overflow-hidden">

<!-- Global Toast Container -->
<div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>


<!-- Sidebar Navigation Shell (Matches React exactly) -->
<aside class="w-64 bg-slate-50/50 border-r border-gray-200 p-4 flex flex-col shadow-sm z-10 hidden md:flex h-screen">
    <div class="mb-8 pl-3 pt-2">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center shadow-sm">
                <i data-lucide="utensils" class="w-4 h-4 text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900">RestaurantHub</h1>
        </div>
        <p class="text-xs text-gray-500 font-medium tracking-wide flex justify-between items-center">
            WAITER DASHBOARD
            <span class="bg-gray-100 px-2 py-0.5 rounded text-[10px] border border-gray-200">LIVE</span>
        </p>
    </div>

    <nav class="flex-1 space-y-1.5" id="navContainer">
        <!-- Nav buttons generated by JS -->
    </nav>

    <div class="mt-4 pt-4 border-t border-gray-100 space-y-1">
        <button class="w-full text-left py-2 px-2 hover:bg-gray-50 rounded-lg transition flex items-center gap-3">
            <div id="sidebarInitials" class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 font-bold flex items-center justify-center text-xs">U</div>
            <div class="flex-1">
                <p id="sidebarFullName" class="text-sm font-medium text-gray-900">User</p>
                <p id="sidebarRole" class="text-xs text-gray-500 capitalize">waiter</p>
            </div>
        </button>
        <!-- Auth / Log Out -->
        <button onclick="localStorage.clear(); window.location.replace('/login.html');" class="flex items-center gap-2 mt-auto p-2 hover:bg-red-50 text-red-600 rounded-lg group transition-colors text-left w-full">
            <i data-lucide="log-out" class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform"></i>
            <span class="text-sm font-medium">Log out</span>
        </button>
    </div>
</aside>

<!-- Main Content Area Shell -->
<main class="flex-1 bg-gray-50 overflow-y-auto w-full p-6 relative">
    <!-- Simulation Clock Container (Top Right) -->
    <div class="fixed top-6 right-8 z-50">
        <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-white border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
            <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 border border-orange-100">
                <i data-lucide="clock" class="w-4 h-4"></i>
            </div>
            <div class="flex flex-col w-full">
                <div class="flex justify-between items-center mb-1">
                    <span id="timeLabel" class="text-[10px] font-bold text-orange-600 leading-none uppercase tracking-wider">Simulated Date & Time</span>
                    <button onclick="resetSimulation()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded text-[9px] font-bold transition">RESET</button>
                </div>
                <div class="flex gap-2">
                    <input type="date" id="currentDateInput" min="2020-01-01" max="2035-12-31" class="bg-transparent text-gray-900 font-bold focus:outline-none cursor-pointer text-sm leading-none w-[110px]" oninput="if(this.value && this.value.split('-')[0].length > 4) { this.value = '2035' + this.value.substring(this.value.indexOf('-')); } updateSystemDateTime();" onblur="if(!this.validity.valid || !this.value){ this.value='2026-04-06'; updateSystemDateTime(); }" title="Override date">
                    <input type="time" id="currentTimeInput" class="bg-transparent text-gray-900 font-bold focus:outline-none focus:text-orange-600 cursor-pointer text-sm leading-none" oninput="if(this.value) updateSystemDateTime();" onblur="if(!this.validity.valid || !this.value){ this.value='11:30'; updateSystemDateTime(); }" title="Override time">
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mt-10" id="mainContainer">
        <!-- Content Injected by JS -->
    </div>
</main>

<script>

    // ==========================================
    // OVERRIDE DEFAULT BROWSER ALERTS WITH TOASTS
    // ==========================================
    window.alert = function(message) {
        const container = document.getElementById('toast-container');
        if (!container) {
            console.log("Alert:", message);
            return;
        }

        const toast = document.createElement('div');

        // Auto-detect if it's an error/warning based on common keywords in the message
        const msgLower = message.toLowerCase();
        const isError = msgLower.includes('fail') || msgLower.includes('invalid') || msgLower.includes('error') ||
            msgLower.includes('overlap') || msgLower.includes('minimum') || msgLower.includes('maximum') ||
            msgLower.includes('must') || msgLower.includes('not found') || msgLower.includes('expired');

        // Base styling
        toast.className = `transform transition-all duration-300 translate-x-full opacity-0 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border text-sm font-semibold max-w-md pointer-events-auto cursor-pointer `;

        if (isError) {
            toast.className += 'bg-white/70 backdrop-blur-md border-red-100 text-red-900';
        } else {
            toast.className += 'bg-gray-900/70 backdrop-blur-md border-gray-800 text-white';
        }

        const iconHTML = isError
            ? `<svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
            : `<svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

        toast.innerHTML = `${iconHTML} <span>${message}</span>`;

        // Click to dismiss early
        toast.onclick = () => {
            toast.classList.add('opacity-0', 'translate-x-full');
            setTimeout(() => toast.remove(), 300);
        };

        container.appendChild(toast);

        // Trigger slide-in animation
        requestAnimationFrame(() => {
            toast.classList.remove('translate-x-full', 'opacity-0');
        });

        // Auto remove after 4 seconds
        setTimeout(() => {
            if(toast.parentElement) {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }
        }, 4000);
    };

    // ==========================================
    // 🔒 ADMIN/WAITER AUTH GUARD
    // ==========================================
    function enforceAuth() {
        const sessionId = localStorage.getItem('restaurantSessionUserId');
        const sessionRole = localStorage.getItem('restaurantSessionRole');

        if (!sessionId || (sessionRole !== 'WAITER' && sessionRole !== 'ADMIN')) {
            window.location.replace('/login.html');
            return false;
        }
        return true;
    }

    enforceAuth();
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) enforceAuth();
    });

    const sessionId = localStorage.getItem('restaurantSessionUserId');
    const sessionRole = localStorage.getItem('restaurantSessionRole');
    const sessionUserName = localStorage.getItem('restaurantSessionUserName') || 'Staff Member';

    if (sessionId) {
        document.getElementById('sidebarFullName').innerText = sessionUserName;
        document.getElementById('sidebarRole').innerText = sessionRole.toLowerCase();

        const parts = sessionUserName.split(' ').filter(p => p.trim() !== '');
        let initials = parts.length > 1
            ? parts[0].charAt(0) + parts[parts.length - 1].charAt(0)
            : sessionUserName.charAt(0);
        document.getElementById('sidebarInitials').innerText = initials.toUpperCase();
    }

    // ========================================================
    // 1. DATA ENGINE (Extracted directly from mockData.ts)
    // ========================================================
    let CURRENT_TIME = new Date('2026-04-06T11:30:00');
    const savedTime = sessionStorage.getItem('simTime_waiter');
    if(savedTime) CURRENT_TIME = new Date(parseInt(savedTime));

    let AREAS = [];

    let tables = [];
    let reservations = [];

    async function loadBackendData() {
        try {
            const [tRes, rRes, aRes] = await Promise.all([
                fetch('/api/tables'),
                fetch('/api/reservations'),
                fetch('/api/areas')
            ]);
            const tData = await tRes.json();
            const rData = await rRes.json();
            const aData = await aRes.json();
            AREAS = aData.map(a => a.name);

            tables = tData.map(t => ({
                id: t.id,
                number: t.tableNumber,
                area: t.area ? t.area.name : "Unknown",
                capacity: t.seatingCapacity,
                status: 'available'
            }));

            reservations = rData.map(r => {
                const [h, m] = r.reservationTime.split(':');
                const dur = r.duration || 2;
                const endH = (parseInt(h) + dur).toString().padStart(2, '0');
                return {
                    id: r.id,
                    customerName: r.customer ? r.customer.username : 'Walk-In Customer',
                    tableNumber: r.table ? r.table.tableNumber : 'VIP',
                    area: r.table && r.table.area ? r.table.area.name : (r.targetArea ? r.targetArea.name : "Unknown"),
                    partySize: r.partySize,
                    startTime: r.reservationTime.substring(0, 5),
                    endTime: `${endH}:${m}`,
                    status: r.status.toLowerCase(),
                    reservationDate: r.reservationDate,
                    duration: dur
                };
            });

            renderNav();
            renderMain();
        } catch (err) {
            console.error("Backend offline", err);
        }
    }

    // URL ROUTING & STATE
    const routeMap = { 'pre-booked': 'prebooked', 'open-tables': 'open', 'should-leave': 'shouldleave', 'all-tables': 'tables', 'lobby': 'lobby' };
    const reverseRouteMap = { 'prebooked': 'pre-booked', 'open': 'open-tables', 'shouldleave': 'should-leave', 'tables': 'all-tables', 'lobby': 'lobby' };
    let hash = window.location.hash.replace('#', '');
    let activeView = routeMap[hash] ? routeMap[hash] : 'prebooked';
    let filterGuestCount = 'all';
    let filterArea = 'all';

    window.addEventListener('popstate', () => {
        let hash = window.location.hash.replace('#', '');
        activeView = routeMap[hash] ? routeMap[hash] : 'prebooked';
        renderNav();
        renderMain();
    });

    // ========================================================
    // 2. TIME UTILS & SIMULATOR
    // ========================================================
    function formatTimeForInput(date) {
        return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }
    function formatDateForInput(date) {
        return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
    }

    window.updateSystemDateTime = () => {
        const dateStr = document.getElementById('currentDateInput').value || formatDateForInput(new Date('2026-04-06'));
        const timeStr = document.getElementById('currentTimeInput').value || '11:30';

        const [year, month, day] = dateStr.split('-');
        const [hours, mins] = timeStr.split(':');

        let y = parseInt(year);
        if(y > 2035) y = 2035;
        if(y < 2020) y = 2020;

        const newDate = new Date(y, parseInt(month)-1, parseInt(day), parseInt(hours), parseInt(mins), 0, 0);
        CURRENT_TIME = newDate;
        document.getElementById('currentDateInput').value = formatDateForInput(newDate);
        sessionStorage.setItem('simTime_waiter', CURRENT_TIME.getTime());
        renderNav();
        renderMain();
    };

    window.resetSimulation = () => {
        sessionStorage.removeItem('simTime_waiter');
        CURRENT_TIME = new Date('2026-04-06T11:30:00');
        document.getElementById('currentDateInput').value = formatDateForInput(CURRENT_TIME);
        document.getElementById('currentTimeInput').value = formatTimeForInput(CURRENT_TIME);
        renderNav();
        renderMain();
    };

    function parseTimeString(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const date = new Date(CURRENT_TIME);
        date.setHours(hours, minutes, 0, 0);
        return date;
    }
    function formatTime(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const period = hours >= 12 ? 'PM' : 'AM';
        const displayHours = hours % 12 || 12;
        return `${displayHours}:${minutes.toString().padStart(2, '0')} ${period}`;
    }
    function getAreaIcon(a) {
        const m = {'Balcony Area':'🌇','Smoking Allowed Area':'🚬','Regular Area':'🍽️','BBQ Area':'🔥','Garden Area':'🌿'};
        return m[a] || '📍';
    }

    // ========================================================
    // 3. NAVIGATION RENDERER
    // ========================================================
    function renderNav() {
        const shouldLeaveCount = reservations.filter(r => {
            if(r.status !== 'arrived') return false;
            const mins = Math.round((parseTimeString(r.endTime).getTime() - CURRENT_TIME.getTime()) / 60000);
            return mins <= 15;
        }).length;

        const lobbyCount = reservations.filter(r => r.status === 'lobby').length;

        const items = [
            { id: 'prebooked', icon: 'clock', label: 'Pre-Booked', desc: 'Reserved customers', badge: null },
            { id: 'lobby', icon: 'sofa', label: 'Lobby', desc: 'Waiting customers', badge: lobbyCount > 0 ? lobbyCount : null },
            { id: 'open', icon: 'door-open', label: 'Open Tables', desc: 'Walk-in customers', badge: null },
            { id: 'shouldleave', icon: 'alert-triangle', label: 'Should Leave', desc: 'Time warnings', badge: shouldLeaveCount > 0 ? shouldLeaveCount : null },
            { id: 'tables', icon: 'layout-grid', label: 'All Tables', desc: 'View all areas', badge: null }
        ];

        document.getElementById('navContainer').innerHTML = items.map(item => `
                <button onclick="switchView('${item.id}')" class="w-full text-left py-3 px-3 rounded-lg flex items-center justify-between transition-all ${activeView === item.id ? 'bg-gray-900 text-white' : 'hover:bg-gray-100 text-gray-700'}">
                    <div class="flex items-center gap-3 w-full">
                        <i data-lucide="${item.icon}" class="w-5 h-5 flex-shrink-0 opacity-80 border-0 ${activeView === item.id ? 'text-white' : 'text-gray-500'}"></i>
                        <div class="flex-1 text-left flex flex-col justify-center gap-[2px]">
                            <div class="flex items-center justify-between w-full font-bold leading-none m-0 p-0 text-sm h-[14px]">
                                ${item.label}
                                ${item.badge ? `<span class="bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">${item.badge}</span>` : ''}
                            </div>
                            <div class="text-[11px] font-medium opacity-80 m-0 p-0 leading-none h-[12px] ${activeView === item.id ? 'text-gray-300' : 'text-gray-500'}">${item.desc}</div>
                        </div>
                    </div>
                </button>
            `).join('');
        lucide.createIcons();
    }

    function switchView(id) {
        activeView = id;
        history.pushState(null, '', `/waiter#${reverseRouteMap[id]}`);
        renderNav();
        renderMain();
    }

    // ========================================================
    // 4. MAIN VIEWS RENDERING ENGINE
    // ========================================================

    function renderMain() {
        // Always hide the walk-in FAB when switching views
        if (activeView !== 'open') {
            const fab = document.getElementById('walkInFab');
            if (fab) fab.classList.add('translate-y-full', 'opacity-0');
        }
        const main = document.getElementById('mainContainer');
        if (activeView === 'prebooked') main.innerHTML = renderPreBooked();
        else if (activeView === 'open') main.innerHTML = renderOpenTables();
        else if (activeView === 'shouldleave') main.innerHTML = renderShouldLeave();
        else if (activeView === 'tables') main.innerHTML = renderAllTables();
        else if (activeView === 'lobby') main.innerHTML = renderLobby();
        lucide.createIcons();
    }

    // ========================================================
    // VIEW: LOBBY
    // ========================================================
    function renderLobby() {
        const lobbyRes = reservations.filter(r => r.status === 'lobby');

        let html = `
                <div class="space-y-6">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-1">Lobby</h1>
                        <p class="text-gray-500 text-sm">Customers who arrived early and are waiting for their table</p>
                    </div>`;

        if (!lobbyRes.length) {
            html += `<div class="bg-white border rounded-xl p-16 text-center">
                    <div class="text-5xl mb-4">🛋️</div>
                    <p class="text-gray-500 font-medium text-lg">Lobby is empty</p>
                    <p class="text-gray-400 text-sm mt-1">No customers are currently waiting</p>
                </div>`;
        } else {
            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            lobbyRes.forEach(r => {
                const waitMins = Math.round((parseTimeString(r.startTime).getTime() - CURRENT_TIME.getTime()) / 60000);
                const waitLabel = waitMins > 0 ? `Table ready in ${waitMins} min` : `Table is ready now!`;
                const waitColor = waitMins > 0 ? 'text-amber-600 bg-amber-50 border-amber-200' : 'text-green-700 bg-green-50 border-green-200';

                html += `
                        <div class="bg-white border-2 border-amber-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-all">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="font-bold text-gray-900 text-base">${r.customerName}</p>
                                    <p class="text-xs text-gray-500 mt-0.5">${r.partySize} Guests • ${formatTime(r.startTime)} → ${formatTime(r.endTime)}</p>
                                </div>
                                <span class="bg-amber-100 text-amber-700 text-[10px] font-black px-2 py-1 rounded-full border border-amber-200 uppercase">Lobby</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1.5 rounded-lg border ${waitColor} mb-4">
                                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                ${waitLabel}
                            </div>
                            <div class="flex items-center gap-1.5 text-xs text-gray-500 mb-4">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-400"></i>
                                <span class="font-medium">${r.area} • Table T-${r.tableNumber}</span>
                            </div>
                            <button onclick="updateGlobalStatus('${r.id}', 'arrived'); renderMain();"
                                class="w-full bg-gray-900 hover:bg-black text-white font-bold py-2 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="armchair" class="w-4 h-4"></i>
                                Seat to Table
                            </button>
                        </div>`;
            });
            html += `</div>`;
        }

        return html + `</div>`;
    }

    async function updateGlobalStatus(resId, newStatus) {
        try {
            const waiterId = localStorage.getItem('restaurantSessionUserId');
            const response = await fetch(`http://localhost:8080/api/reservations/${resId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus.toUpperCase(), waiterId: waiterId })
            });
            if (response.ok) {
                reservations = reservations.map(r => r.id == resId ? { ...r, status: newStatus } : r);
                renderNav();
                renderMain();
            } else {
                const err = await response.text();
                alert("Backend Error updating status: " + err);
            }
        } catch(e) {
            console.error("Failed to reach backend", e);
        }
    }

    window.updateGlobalStatus = updateGlobalStatus; // Export to window for html onclick

    // VIEW 1: PRE-BOOKED
    function renderPreBooked() {
        const targetDate = formatDateForInput(CURRENT_TIME);
        const curH = CURRENT_TIME.getHours();
        const curM = CURRENT_TIME.getMinutes();
        let startH = curH - 2;
        if(startH < 0) startH = 0;
        const numHours = 4; // 8 columns of 30 mins

        let headerHtml = `<div class="grid grid-cols-[120px_repeat(8,1fr)] sticky top-0 z-30 shadow-sm bg-white">
                                <div class="p-2 font-bold text-gray-700 flex items-center text-[10px] uppercase bg-white border-r border-b border-gray-200">Table</div>`;
        for(let h = startH; h < startH + numHours; h++) {
            const hourStr = h > 12 ? `${h-12} PM` : (h===12 ? `12 PM` : `${h} AM`);
            headerHtml += `<div class="col-span-2 p-1.5 border-r border-b border-gray-200 text-center font-bold text-[10px] text-gray-500 bg-gray-50 flex items-center justify-center">${hourStr}</div>`;
        }
        headerHtml += `</div>`;

        let rowsHtml = '';

        AREAS.forEach(area => {
            const areaTables = tables.filter(t => t.area === area);
            if(!areaTables.length) return;

            rowsHtml += `<div class="bg-gray-100 p-1.5 pl-3 font-bold text-gray-800 text-[10px] border-b border-gray-200 uppercase tracking-wider">${area}</div>`;

            areaTables.forEach(table => {
                const tableRes = reservations.filter(r =>
                    r.reservationDate === targetDate &&
                    r.tableNumber === table.number &&
                    r.area === area &&
                    ['booked', 'confirmed'].includes(r.status)
                );

                let rowContent = `<div class="grid grid-cols-[120px_repeat(8,1fr)] border-b border-gray-100 relative group min-h-[44px]">
                                        <div class="p-2 pl-3 font-bold text-gray-700 text-sm flex items-center bg-white group-hover:bg-gray-50 border-r border-gray-200 z-20">T${table.number} <span class="text-[9px] ml-1 text-gray-400">(${table.capacity})</span></div>`;

                for(let i=0; i<8; i++) {
                    rowContent += `<div class="border-r border-gray-100 ${i%2===0 ? 'border-dashed border-gray-200' : ''}"></div>`;
                }

                tableRes.forEach(r => {
                    const [hours, mins] = r.startTime.split(':').map(Number);

                    let offsetHours = hours - startH;
                    let offsetMins = mins / 60;
                    let startCol = (offsetHours * 2) + (offsetMins * 2);

                    const duration = r.duration || 2;
                    const spanCols = duration * 2;

                    if(startCol + spanCols <= 0) return;
                    if(startCol >= 8) return;

                    let renderStartCol = startCol;
                    let renderSpan = spanCols;

                    if(renderStartCol < 0) {
                        renderSpan += renderStartCol;
                        renderStartCol = 0;
                    }
                    if(renderStartCol + renderSpan > 8) {
                        renderSpan = 8 - renderStartCol;
                    }

                    let colorClass = (r.status === 'booked' || r.status === 'confirmed') ? 'bg-blue-100 border-blue-300 text-blue-800' :
                        'bg-green-100 border-green-300 text-green-800';

                    rowContent += `<div onclick="openWaiterActionModal('${r.id}')" class="absolute inset-y-1 rounded border p-1 overflow-hidden shadow-sm flex flex-col justify-center cursor-pointer hover:shadow hover:-translate-y-[1px] transition-all ${colorClass} z-10"
                                            style="left: calc(120px + ((100% - 120px) * ${renderStartCol/8})); width: calc(((100% - 120px) * ${renderSpan/8}) - 4px);"
                                            title="${r.customerName} - ${r.partySize} Guests (${formatTime(r.startTime)})">
                                            <div class="text-[10px] font-bold leading-tight truncate">${r.customerName}</div>
                                            <div class="text-[9px] font-medium leading-tight truncate opacity-80">${r.partySize} Guests</div>
                                       </div>`;
                });

                const curOffsetHours = curH - startH;
                const curOffsetMins = curM / 60;
                const curCol = (curOffsetHours * 2) + (curOffsetMins * 2);
                if(curCol >= 0 && curCol <= 8) {
                    rowContent += `<div class="absolute inset-y-0 w-0.5 bg-red-500 z-15" style="left: calc(120px + ((100% - 120px) * ${curCol/8})); box-shadow: 0 0 4px rgba(239,68,68,0.5);"></div>`;
                }

                rowContent += `</div>`;
                rowsHtml += rowContent;
            });
        });

        return `
                <div class="space-y-6">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-1">Live Timeline</h1>
                        <p class="text-gray-600 text-sm">Showing +/- 2 hours around current time</p>
                    </div>
                    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm relative">
                        <div class="overflow-x-auto min-w-[600px]">
                            ${headerHtml}
                            ${rowsHtml}
                        </div>
                    </div>
                    <div class="flex items-center gap-4 text-xs font-bold text-gray-500 mt-4 px-2">
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-blue-100 border border-blue-300"></div> Booked</div>
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-green-100 border border-green-300"></div> Seated</div>
                        <div class="flex items-center gap-1.5"><div class="w-0.5 h-3 bg-red-500"></div> Current Time</div>
                    </div>
                </div>`;
    }
    // VIEW 2: OPEN TABLES
    // =====================================================
    // WALK-IN TIMELINE CONFIG — Change these as you like!
    // =====================================================
    let WALKIN_WINDOW_BEFORE_HOURS = 0;  // Show this many hours BEFORE current time
    let WALKIN_WINDOW_AFTER_HOURS  = 3;  // Show this many hours AFTER current time (max assignable window)
    let WALKIN_MIN_DURATION = 1;          // Minimum booking length in hours
    let WALKIN_MAX_DURATION = 3;          // Maximum booking length in hours
    // =====================================================

    let walkInSelection = { tableId: null, startHour: null, endHour: null };

    function clearWalkInSelection() {
        walkInSelection = { tableId: null, startHour: null, endHour: null };
        document.querySelectorAll('.wi-cell').forEach(c => c.classList.remove('bg-amber-200','border-amber-400','bg-amber-100'));
        const fab = document.getElementById('walkInFab');
        if (fab) fab.classList.add('translate-y-full', 'opacity-0');
    }

    function handleWalkInClick(tableId, hour) {
        if (walkInSelection.tableId !== null && walkInSelection.tableId !== tableId) {
            clearWalkInSelection();
        }

        if (walkInSelection.startHour === null) {
            walkInSelection.tableId = tableId;
            walkInSelection.startHour = hour;
            renderWalkInHighlight();
            return;
        }

        if (walkInSelection.startHour !== null && walkInSelection.endHour === null) {
            if (hour <= walkInSelection.startHour) {
                clearWalkInSelection();
                walkInSelection.tableId = tableId;
                walkInSelection.startHour = hour;
                renderWalkInHighlight();
                return;
            }

            const duration = hour - walkInSelection.startHour;
            if (duration > WALKIN_MAX_DURATION) {
                alert(`Maximum walk-in duration is ${WALKIN_MAX_DURATION} hours.`);
                return;
            }
            if (duration < WALKIN_MIN_DURATION) {
                alert(`Minimum walk-in duration is ${WALKIN_MIN_DURATION} hour.`);
                return;
            }

            // Check overlap with existing reservations
            const blocks = document.querySelectorAll(`.wi-reserved[data-table="${tableId}"]`);
            for (let block of blocks) {
                const bStart = parseInt(block.dataset.starthour);
                if (bStart >= walkInSelection.startHour && bStart < hour) {
                    alert('That range overlaps an existing reservation.');
                    return;
                }
            }

            walkInSelection.endHour = hour;
            renderWalkInHighlight();
            showWalkInFab();
            return;
        }

        // Third click: reset
        clearWalkInSelection();
        walkInSelection.tableId = tableId;
        walkInSelection.startHour = hour;
        renderWalkInHighlight();
    }

    function renderWalkInHighlight() {
        document.querySelectorAll('.wi-cell').forEach(c => c.classList.remove('bg-amber-200','border-amber-400','bg-amber-100'));
        if (walkInSelection.tableId === null) return;
        const end = walkInSelection.endHour !== null ? walkInSelection.endHour : walkInSelection.startHour + 1;
        for (let h = walkInSelection.startHour; h < end; h++) {
            const cell = document.getElementById(`wi-cell-${walkInSelection.tableId}-${h}`);
            if (cell) cell.classList.add('bg-amber-200', 'border-amber-400');
        }
    }

    function showWalkInFab() {
        let fab = document.getElementById('walkInFab');
        if (!fab) {
            fab = document.createElement('div');
            fab.id = 'walkInFab';
            fab.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-6 z-50 transition-all duration-300 translate-y-full opacity-0';
            fab.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Selected Slot</span>
                        <span id="wiFabTime" class="font-bold">--:-- to --:--</span>
                    </div>
                    <button onclick="triggerWalkInBooking()" class="bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold px-5 py-2 rounded-full shadow-sm transition-colors flex items-center gap-2">
                        Assign Walk-In <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                    <button onclick="clearWalkInSelection()" class="text-gray-400 hover:text-white p-1 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                `;
            document.body.appendChild(fab);
            lucide.createIcons();
        }
        const startStr = `${walkInSelection.startHour.toString().padStart(2,'0')}:00`;
        const endStr   = `${walkInSelection.endHour.toString().padStart(2,'0')}:00`;
        document.getElementById('wiFabTime').innerText = `${startStr} → ${endStr}`;
        fab.classList.remove('translate-y-full', 'opacity-0');
    }

    function triggerWalkInBooking() {
        if (!walkInSelection.tableId || walkInSelection.startHour === null || walkInSelection.endHour === null) return;
        const table = tables.find(t => t.id == walkInSelection.tableId);
        if (!table) return;

        // Pre-fill and open the assign modal
        document.getElementById('modalTableId').value = table.id;
        document.getElementById('modalTableName').innerText = `Table ${table.number}`;
        document.getElementById('modalTableDetails').innerText = `${table.area} • Capacity: ${table.capacity}`;
        document.getElementById('modalCapacityErr').innerText = `Maximum capacity: ${table.capacity} guests`;
        document.getElementById('wiGuests').max = table.capacity;

        // Store the selected time so submitWalkIn can use it
        window._walkInStartHour = walkInSelection.startHour;
        window._walkInDuration  = walkInSelection.endHour - walkInSelection.startHour;

        document.getElementById('assignModalOverlay').classList.remove('hidden');

        const fab = document.getElementById('walkInFab');
        if (fab) fab.classList.add('translate-y-full', 'opacity-0');
    }

    window.handleWalkInClick = handleWalkInClick;
    window.clearWalkInSelection = clearWalkInSelection;
    window.triggerWalkInBooking = triggerWalkInBooking;

    let walkInFilterArea  = 'ALL';
    let walkInFilterParty = 1;
    window.setWalkInArea  = (a) => { walkInFilterArea  = a; renderMain(); };
    window.setWalkInParty = (v) => { walkInFilterParty = parseInt(v) || 1; renderMain(); };

    function renderOpenTables() {
        clearWalkInSelection();

        const curH    = CURRENT_TIME.getHours();
        const startH  = Math.max(0, curH - WALKIN_WINDOW_BEFORE_HOURS);
        const endH    = Math.min(24, curH + WALKIN_WINDOW_AFTER_HOURS + 1);
        const numHours = endH - startH;
        const targetDate = formatDateForInput(CURRENT_TIME);

        // Header row
        let headerHtml = `<div class="grid sticky top-0 z-30 shadow-sm bg-white" style="grid-template-columns: 120px repeat(${numHours}, 1fr);">
                                <div class="p-2 font-bold text-gray-700 flex items-center text-[10px] uppercase bg-white border-r border-b border-gray-200">Table</div>`;
        for (let h = startH; h < endH; h++) {
            const label = h > 12 ? `${h-12} PM` : (h === 12 ? '12 PM' : `${h} AM`);
            const isNow = (h === curH);
            headerHtml += `<div class="p-1.5 border-r border-b border-gray-200 text-center font-bold text-[10px] ${isNow ? 'bg-amber-50 text-amber-700' : 'text-gray-500 bg-gray-50'} flex items-center justify-center">${label}${isNow ? ' ◀' : ''}</div>`;
        }
        headerHtml += `</div>`;

        let rowsHtml = '';
        let hasAny = false;

        AREAS.forEach(area => {
            if (walkInFilterArea !== 'ALL' && area !== walkInFilterArea) return;
            const areaTables = tables.filter(t => t.area === area && t.capacity >= walkInFilterParty);
            if (!areaTables.length) return;
            hasAny = true;

            rowsHtml += `<div class="bg-gradient-to-r from-amber-50 to-transparent p-1.5 pl-3 font-bold text-amber-900 text-[10px] border-b border-amber-100 uppercase tracking-wider flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-3 h-3"></i> ${area}
                             </div>`;

            areaTables.forEach(table => {
                const tableRes = reservations.filter(r =>
                    r.reservationDate === targetDate &&
                    r.tableNumber === table.number &&
                    r.area === area &&
                    !['cancelled','completed'].includes(r.status)
                );

                let rowContent = `<div class="grid border-b border-gray-100 relative group min-h-[44px]" style="grid-template-columns: 120px repeat(${numHours}, 1fr);">
                                        <div class="p-2 pl-3 font-bold text-gray-700 text-sm flex items-center bg-white group-hover:bg-gray-50 border-r border-gray-200 z-20">
                                            T${table.number} <span class="text-[9px] ml-1 text-gray-400">(${table.capacity})</span>
                                        </div>`;

                // Render cells
                for (let h = startH; h < endH; h++) {
                    const isPast = h < curH;
                    if (isPast) {
                        rowContent += `<div class="border-r border-gray-100 bg-gray-100 relative overflow-hidden cursor-not-allowed" title="Past">
                                <div class="absolute inset-0 opacity-10" style="background:repeating-linear-gradient(45deg,transparent,transparent 5px,#000 5px,#000 10px);"></div>
                            </div>`;
                    } else {
                        rowContent += `<div id="wi-cell-${table.id}-${h}" onclick="handleWalkInClick('${table.id}', ${h})" class="wi-cell border-r border-gray-100 cursor-pointer hover:bg-amber-50 transition-colors h-full" data-hour="${h}"></div>`;
                    }
                }

                // Overlay existing reservations
                tableRes.forEach(r => {
                    const [rH] = r.startTime.split(':').map(Number);
                    const dur = r.duration || 2;
                    let renderStart = rH - startH;
                    let renderSpan  = dur;
                    if (renderStart + renderSpan <= 0 || renderStart >= numHours) return;
                    if (renderStart < 0) { renderSpan += renderStart; renderStart = 0; }
                    if (renderStart + renderSpan > numHours) renderSpan = numHours - renderStart;

                    rowContent += `<div class="wi-reserved absolute inset-y-1 rounded border overflow-hidden bg-red-100 border-red-200 z-10 cursor-not-allowed"
                                            data-table="${table.id}" data-starthour="${rH}" data-endhour="${rH + dur}"
                                            style="left:calc(120px + ((100% - 120px) * ${renderStart/numHours})); width:calc(((100% - 120px) * ${renderSpan/numHours}) - 4px);"
                                            title="Reserved"></div>`;
                });

                // Current time line
                const curOffset = (curH - startH) + (CURRENT_TIME.getMinutes() / 60);
                if (curOffset >= 0 && curOffset <= numHours) {
                    rowContent += `<div class="absolute inset-y-0 w-0.5 bg-orange-500 z-15" style="left:calc(120px + ((100% - 120px) * ${curOffset/numHours})); box-shadow:0 0 4px rgba(249,115,22,0.5);"></div>`;
                }

                rowContent += `</div>`;
                rowsHtml += rowContent;
            });
        });

        // Build area filter pills
        const areaPills = ['ALL', ...AREAS].map(a => {
            const active = walkInFilterArea === a;
            return `<button onclick="setWalkInArea('${a}')" class="px-4 py-1.5 rounded-full text-sm font-bold transition-colors ${active ? 'bg-amber-600 text-white shadow-sm' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}">${a === 'ALL' ? 'All Areas' : a}</button>`;
        }).join('');

        return `
                <div class="space-y-6">
                    <div class="flex items-start justify-between">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900 mb-1">Walk-In Assignment</h1>
                            <p class="text-gray-500 text-sm">📅 ${targetDate} — Click a slot, then click the end hour to assign a walk-in</p>
                        </div>
                        <div class="flex items-center gap-4 text-xs font-bold text-gray-500 mt-1">
                            <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-white border border-gray-300"></div> Available</div>
                            <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-amber-200 border border-amber-400"></div> Selected</div>
                            <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-red-100 border border-red-200"></div> Occupied</div>
                        </div>
                    </div>

                    <!-- Filter Card -->
                    <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-xl shadow-sm">
                        <div class="p-5">
                            <div class="mb-4">
                                <label class="mb-2 block text-sm font-semibold">Guest Count</label>
                                <input type="number" min="1" max="50" value="${walkInFilterParty}"
                                    oninput="setWalkInParty(this.value)"
                                    class="h-9 w-48 rounded-md border border-amber-300 bg-white px-3 py-1 text-sm shadow-sm focus:outline-none focus:ring-1 focus:ring-amber-500">
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-semibold">Filter by Area</label>
                                <div class="flex flex-wrap gap-2">${areaPills}</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm relative">
                        <div class="overflow-x-auto min-w-[600px]">
                            ${headerHtml}
                            ${rowsHtml}
                        </div>
                    </div>
                </div>`;
    }

    window.markInformed = (resId, colorLvl) => {
        reservations = reservations.map(r => r.id == resId ? { ...r, informedLevel: colorLvl } : r);
        renderMain();
    };

    // VIEW 3: SHOULD LEAVE
    function renderShouldLeave() {
        const diningAlerts = reservations.filter(r => r.status === 'arrived' || r.status === 'leaving').map(r => {
            const mins = Math.round((parseTimeString(r.endTime).getTime() - CURRENT_TIME.getTime()) / 60000);
            return { ...r, mins };
        }).filter(d => d.mins <= 30).map(d => {
            const color = d.mins <= 0 ? 'red' : (d.mins <= 15 ? 'orange' : 'green');
            return { ...d, color };
        }).sort((a,b) => {
            const aInf = a.informedLevel === a.color;
            const bInf = b.informedLevel === b.color;
            if (aInf === bInf) return a.mins - b.mins;
            return aInf ? 1 : -1;
        });

        const warnCount = diningAlerts.filter(d => d.mins <= 15).length;
        let html = `<div class="space-y-8">
                <div>
                    <h1 class="text-4xl font-bold text-gray-900 mb-2">Departure Management</h1>
                    <p class="text-gray-600 mb-3">Monitor customers nearing the end of their reservation (30 mins or less)</p>
                    ${warnCount>0 ? `<span class="bg-red-100 border border-red-200 text-red-700 px-3 py-1 rounded text-xs font-bold flex w-max items-center gap-2"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> ${warnCount} Tables Need Attention</span>`:''}
                </div>`;

        if(!diningAlerts.length) return html + `<div class="bg-white border rounded-xl p-12 text-center text-gray-500 font-medium">No customers currently within their 30-minute departure window</div></div>`;

        const urgencyZones = [
            { colorId: 'red', title: 'Overdue (Must Leave)', icon: 'alert-octagon', headerTheme: 'bg-red-50 text-red-800 border-b border-red-100' },
            { colorId: 'orange', title: 'Ending Soon (< 15 mins)', icon: 'bell', headerTheme: 'bg-orange-50 text-orange-800 border-b border-orange-100' },
            { colorId: 'green', title: 'Start Preparing (< 30 mins)', icon: 'clock', headerTheme: 'bg-green-50 text-green-800 border-b border-green-100' }
        ];

        urgencyZones.forEach(zone => {
            const zoneDining = diningAlerts.filter(d => d.color === zone.colorId);
            if(!zoneDining.length) return;

            const cards = zoneDining.map(r => {
                const bColors = {red: 'bg-red-500 border-red-600', orange: 'bg-orange-500 border-orange-600', green: 'bg-green-500 border-green-600'};
                const isInformed = r.informedLevel === r.color;

                const informUi = isInformed
                    ? `<div class="w-full text-xs font-bold py-[7px] flex justify-center gap-1.5 text-white/90 mb-1.5"><i data-lucide="check-check" class="w-4 h-4"></i> Informed</div>`
                    : `<button onclick="markInformed('${r.id}', '${r.color}')" class="w-full mt-2 text-[11px] font-bold py-2 rounded bg-white text-${r.color}-700 hover:bg-gray-100 flex items-center justify-center gap-1.5 transition-colors shadow-sm mb-1.5"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> Inform Customer</button>`;

                const checkoutBtn = `<button onclick="updateGlobalStatus('${r.id}', 'completed')" class="w-full text-[10px] font-bold py-1.5 rounded border border-white/40 hover:bg-white/10 flex items-center justify-center gap-1 transition-colors"><i data-lucide="door-open" class="w-3 h-3"></i> Check Out</button>`;

                return `
                    <div class="${bColors[r.color]} ${isInformed ? 'opacity-80' : ''} border-[3px] rounded-xl p-4 text-center text-white shadow-md flex flex-col items-center select-none cursor-default transition-transform hover:-translate-y-1 relative">
                        <div class="flex items-center gap-2 mb-1 opacity-90"><i data-lucide="map-pin" class="w-3 h-3"></i> <span class="text-[10px] font-bold uppercase tracking-wider">${r.area}</span></div>
                        <div class="text-4xl font-black mb-3 tracking-tight">T${r.tableNumber}</div>
                        <div class="text-sm font-bold flex gap-1.5 items-center mb-1.5 bg-white/10 px-3 py-1 rounded-full"><i data-lucide="clock" class="w-4 h-4"></i> ${r.mins<=0 ? Math.abs(r.mins)+' min over' : r.mins+' min left'}</div>
                        <div class="text-xs border-t border-white/20 pt-2 w-full truncate font-bold mt-1 opacity-90 mb-1">${r.customerName}</div>
                        ${informUi}
                        ${checkoutBtn}
                    </div>`;
            }).join('');

            html += `<div class="bg-white rounded-xl border overflow-hidden shadow-sm"><div class="px-6 py-4 flex justify-between ${zone.headerTheme}"><h3 class="font-bold flex items-center gap-2"><i data-lucide="${zone.icon}" class="w-5 h-5"></i> ${zone.title}</h3><span class="bg-white/50 px-2.5 py-0.5 rounded-full text-xs font-black shadow-sm">${zoneDining.length}</span></div><div class="p-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">${cards}</div></div>`;
        });
        return html + '</div>';
    }

    // VIEW 4: ALL TABLES
    function renderAllTables() {
        // Legend items: [bgColor, borderColor, textColor, label]
        const legendItems = [
            ['bg-gray-50',   'border-gray-300',  'text-gray-600',  'Available'],
            ['bg-blue-100',  'border-blue-300',  'text-blue-800',  'Reserved'],
            ['bg-green-100', 'border-green-300', 'text-green-800', 'Seated'],
            ['bg-amber-100', 'border-amber-300', 'text-amber-800', 'Leaving Soon'],
            ['bg-red-100',   'border-red-300',   'text-red-800',   'Overdue'],
        ];

        const legendHtml = legendItems.map(([bg, border, text, label]) =>
            `<div class="flex items-center gap-2">
                    <div class="w-7 h-7 ${bg} border-2 ${border} rounded-lg shadow-sm"></div>
                    <span class="text-xs font-bold ${text}">${label}</span>
                </div>`
        ).join('');

        let html = `
                <div class="space-y-8">
                    <div>
                        <h1 class="text-4xl font-bold text-gray-900 mb-2">All Tables Overview</h1>
                        <p class="text-gray-600">View all tables organized by areas with current status</p>
                    </div>
                    <div class="bg-white rounded-xl border mb-6">
                        <div class="border-b px-6 py-3 font-bold text-sm">Status Legend</div>
                        <div class="p-5 flex flex-wrap gap-4">${legendHtml}</div>
                    </div>`;

        AREAS.forEach(area => {
            const areaTables = tables.filter(t => t.area === area);
            if (!areaTables.length) return;

            const todayStr = formatDateForInput(CURRENT_TIME);
            const now = CURRENT_TIME.getTime();

            const makeCard = (table) => {
                // Priority 1: physically at table (arrived/leaving) — no endTime check, they're still there
                const seatedRes = reservations.find(r =>
                    r.area === area &&
                    r.tableNumber === table.number &&
                    r.reservationDate === todayStr &&
                    ['arrived', 'leaving'].includes(r.status) &&
                    parseTimeString(r.startTime).getTime() <= now
                );

                // Priority 2: reserved slot currently active (customer hasn't arrived yet)
                const reservedRes = !seatedRes && reservations.find(r =>
                    r.area === area &&
                    r.tableNumber === table.number &&
                    r.reservationDate === todayStr &&
                    ['booked', 'confirmed'].includes(r.status) &&
                    parseTimeString(r.startTime).getTime() <= now &&
                    parseTimeString(r.endTime).getTime() > now
                );

                const res = seatedRes || reservedRes;

                if (!res) {
                    // Available
                    return `<div class="bg-gray-50 border-2 border-gray-300 text-gray-500 rounded-lg p-3 text-center flex flex-col justify-center items-center hover:shadow-md transition-all cursor-default">
                            <span class="text-2xl font-black mb-0.5">T${table.number}</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider opacity-70">Available</span>
                        </div>`;
                }

                const minsLeft = Math.round((parseTimeString(res.endTime).getTime() - CURRENT_TIME.getTime()) / 60000);

                // Determine effective display status
                let displayStatus = res.status;
                if (res.status === 'arrived' && minsLeft <= 30) {
                    displayStatus = minsLeft <= 0 ? 'overdue' : 'leaving-soon';
                }

                // Color map
                const colorMap = {
                    booked:         ['bg-blue-100',  'border-blue-300',  'text-blue-800',  'border-blue-200',  'Reserved'],
                    confirmed:      ['bg-blue-100',  'border-blue-300',  'text-blue-800',  'border-blue-200',  'Reserved'],
                    arrived:        ['bg-green-100', 'border-green-300', 'text-green-800', 'border-green-200', 'Seated'],
                    'leaving-soon': ['bg-amber-100', 'border-amber-400', 'text-amber-900', 'border-amber-300', 'Leaving Soon'],
                    overdue:        ['bg-red-100',   'border-red-400',   'text-red-900',   'border-red-300',   'Overdue'],
                    leaving:        ['bg-amber-100', 'border-amber-400', 'text-amber-900', 'border-amber-300', 'Leaving Soon'],
                };
                const [bg, border, text, divider, label] = colorMap[displayStatus] || colorMap['arrived'];

                // Time badge — only for seated/leaving-soon (not overdue, label covers it)
                let timeBadge = '';
                if (['arrived', 'leaving-soon', 'leaving'].includes(displayStatus)) {
                    if (minsLeft > 0) {
                        const h = Math.floor(minsLeft / 60), m = minsLeft % 60;
                        const timeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
                        timeBadge = `<div class="text-[9px] font-bold mt-1 flex items-center justify-center gap-0.5"><i data-lucide="clock" class="w-2.5 h-2.5 inline"></i> ${timeStr} left</div>`;
                    } else {
                        timeBadge = `<div class="text-[9px] font-black mt-1 flex items-center justify-center gap-0.5 text-red-600 animate-pulse"><i data-lucide="alert-circle" class="w-2.5 h-2.5 inline"></i> OVERDUE</div>`;
                    }
                }

                return `<div class="${bg} border-2 ${border} ${text} rounded-lg p-3 text-center flex flex-col justify-center items-center hover:shadow-md transition-all cursor-default">
                        <span class="text-2xl font-black mb-0.5">T${table.number}</span>
                        <span class="text-[10px] font-bold uppercase tracking-wider opacity-90">${label}</span>
                        ${timeBadge}
                    </div>`;
            };

            html += `<div class="bg-white rounded-xl border overflow-hidden">
                    <div class="border-b px-6 py-4 flex justify-between bg-gray-50/50">
                        <h3 class="font-bold flex items-center gap-2"><span class="text-xl">${getAreaIcon(area)}</span> ${area} Area</h3>
                        <span class="bg-white border text-xs px-2 py-1 rounded-full font-bold shadow-sm">${areaTables.length} Tables</span>
                    </div>
                    <div class="p-6 grid grid-cols-4 lg:grid-cols-10 gap-3">${areaTables.map(makeCard).join('')}</div>
                </div>`;
        });

        html += `</div>`;
        return html;
    }

    // ========================================================
    // 5. WALK-IN ASSIGNMENT MODAL LOGIC
    // ========================================================
    window.openAssignModal = (tableId) => {
        const table = tables.find(t => t.id == tableId);
        if(!table) return;

        document.getElementById('modalTableId').value = table.id;
        document.getElementById('modalTableName').innerText = `Table ${table.number}`;
        document.getElementById('modalTableDetails').innerText = `${table.area} • Capacity: ${table.capacity}`;
        document.getElementById('modalCapacityErr').innerText = `Maximum capacity: ${table.capacity} guests`;

        document.getElementById('wiGuests').max = table.capacity;
        document.getElementById('assignModalOverlay').classList.remove('hidden');
    };

    window.closeAssignModal = () => {
        document.getElementById('assignModalOverlay').classList.add('hidden');
        document.getElementById('assignWalkInForm').reset();
    };

    window.submitWalkIn = async (e) => {
        e.preventDefault();
        const tId = document.getElementById('modalTableId').value;
        const tableObj = tables.find(t => t.id == tId);

        const g = document.getElementById('wiGuests').value;
        const n = document.getElementById('wiName').value;
        const p = document.getElementById('wiPhone').value;
        const waiterId = localStorage.getItem('restaurantSessionUserId') ? parseInt(localStorage.getItem('restaurantSessionUserId')) : null;

        const sDate = `${CURRENT_TIME.getFullYear()}-${(CURRENT_TIME.getMonth()+1).toString().padStart(2, '0')}-${CURRENT_TIME.getDate().toString().padStart(2, '0')}`;

        // Use timeline-selected time if available, otherwise fallback to current time
        const startHour = (window._walkInStartHour !== undefined) ? window._walkInStartHour : CURRENT_TIME.getHours();
        const duration  = (window._walkInDuration  !== undefined) ? window._walkInDuration  : (parseInt(document.getElementById('wiDuration')?.value) || 2);
        const sTime = `${startHour.toString().padStart(2,'0')}:00`;
        window._walkInStartHour = undefined;
        window._walkInDuration  = undefined;

        try {
            const response = await fetch('/api/reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customerId: -1,
                    contactInfo: p,
                    walkInName: n,
                    waiterId: waiterId,
                    tableId: tableObj.id,
                    date: sDate,
                    time: sTime,
                    partySize: parseInt(g),
                    duration: duration
                })
            });

            if (response.ok) {
                const rData = await response.json();

                // Immediately transition walk-in to seated
                await updateGlobalStatus(rData.id, 'arrived');

                closeAssignModal();
                await loadBackendData(); // Reload all data to sync
            } else {
                const err = await response.text();
                alert("Backend Error submitting walkin: " + err);
            }
        } catch(err) {
            console.error("Failed to reach backend", err);
        }
    };

    // Initialize App
    document.getElementById('currentDateInput').value = formatDateForInput(CURRENT_TIME);
    document.getElementById('currentTimeInput').value = formatTimeForInput(CURRENT_TIME);


    window.openWaiterActionModal = (id) => {
        const res = reservations.find(r => r.id == id);
        if(!res) return;

        document.getElementById('wa-modal-name').innerText = res.customerName;
        document.getElementById('wa-modal-time-start').innerText = formatTime(res.startTime);
        document.getElementById('wa-modal-time-end').innerText = formatTime(res.endTime);
        document.getElementById('wa-modal-guests').innerText = res.partySize + ' Guests';
        document.getElementById('wa-modal-location').innerText = `Table T-${res.tableNumber}`;
        document.getElementById('wa-modal-status').innerText = res.status;

        let btnsHtml = '';
        if(res.status === 'booked' || res.status === 'confirmed') {
            btnsHtml += `<button onclick="updateGlobalStatus('${res.id}', 'lobby'); toggleModal('waiter-action-modal')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg mb-2 shadow-sm transition-colors flex items-center justify-center gap-2"><i data-lucide='sofa' class='w-4 h-4'></i> Move to Lobby (Early Arrival)</button>`;
            btnsHtml += `<button onclick="updateGlobalStatus('${res.id}', 'arrived'); toggleModal('waiter-action-modal')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg shadow-sm transition-colors">Mark Seated</button>`;
        } else if (res.status === 'lobby') {
            btnsHtml += `<div class="bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-amber-800 text-sm text-center">Status: <b>${res.status}</b></div>`;
        } else if (res.status === 'arrived') {
            btnsHtml += `<div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-green-800 text-sm text-center">Status: <b>${res.status}</b></div>`;
        }

        document.getElementById('wa-modal-actions').innerHTML = btnsHtml;

        document.getElementById('waiter-action-modal').classList.remove('hidden');
        document.getElementById('waiter-action-modal').classList.add('flex');
    }

    window.toggleModal = (id) => {
        const el = document.getElementById(id);
        if(el.classList.contains('hidden')) {
            el.classList.remove('hidden');
            el.classList.add('flex');
        } else {
            el.classList.add('hidden');
            el.classList.remove('flex');
        }
    }

    // Initial Backend Bootup
    loadBackendData();
</script>


<!-- Waiter Action Modal Overlay -->
<div id="waiter-action-modal" class="fixed inset-0 bg-black/60 hidden z-50 items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-fade-in-up relative">
        <div class="p-5 flex justify-between items-start bg-white border-b border-gray-100">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Manage Reservation</h2>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mt-1" id="wa-modal-status"></p>
            </div>
            <button onclick="toggleModal('waiter-action-modal')" class="text-gray-400 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 p-1.5 rounded-lg transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="p-5 space-y-3">
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"><i data-lucide="user" class="w-5 h-5"></i></div>
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">Customer</p>
                    <p class="font-bold text-gray-900 text-sm" id="wa-modal-name"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 col-span-2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Time</p>
                    <p class="font-bold text-gray-900 text-sm flex items-center gap-1.5">
                        <i data-lucide="clock" class="w-3.5 h-3.5 text-orange-500 flex-shrink-0"></i>
                        <span id="wa-modal-time-start"></span>
                        <span class="text-gray-400 font-normal">→</span>
                        <span id="wa-modal-time-end"></span>
                    </p>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Guests</p>
                    <p class="font-bold text-gray-900 text-sm flex items-center gap-1.5"><i data-lucide="users" class="w-3.5 h-3.5 text-blue-500"></i> <span id="wa-modal-guests"></span></p>
                </div>
            </div>

            <div class="bg-blue-50/60 border border-blue-100 rounded-lg p-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="map-pin" class="text-blue-500 w-4 h-4"></i>
                    <span class="font-bold text-blue-900 text-sm" id="wa-modal-location"></span>
                </div>
            </div>
        </div>

        <div class="p-5 pt-2 border-t border-gray-100" id="wa-modal-actions">
            <!-- Action Buttons Injected Here -->
        </div>
    </div>
</div>

<!-- Assign Modal Overlay -->
<div id="assignModalOverlay" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up">
        <div class="p-5 flex justify-between items-center bg-white">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Assign Walk-In Customer</h2>
                <p class="text-sm text-gray-500 mt-1">Enter customer details and assign them to the selected table</p>
            </div>
            <button onclick="closeAssignModal()" class="text-gray-400 hover:text-gray-900 transition p-1 rounded-full hover:bg-gray-100 mb-auto"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div class="px-5 pb-5">
            <div class="bg-blue-50/60 border border-blue-100 rounded-lg p-3.5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i data-lucide="utensils" class="text-blue-400 w-5 h-5 opacity-70"></i>
                    <div>
                        <div class="font-bold text-blue-900 text-[15px]" id="modalTableName">Table X</div>
                        <div class="text-xs text-blue-700 font-medium opacity-80 mt-0.5" id="modalTableDetails">Area • Capacity: X</div>
                    </div>
                </div>
                <span class="bg-green-600 shadow-sm text-white text-[11px] font-bold px-2.5 py-1 rounded-md tracking-wide">Available</span>
            </div>
        </div>

        <form id="assignWalkInForm" onsubmit="submitWalkIn(event)" class="p-5 pt-0 space-y-4">
            <input type="hidden" id="modalTableId">

            <div>
                <label class="flex items-center gap-2 text-sm font-bold text-gray-900 mb-1.5"><i data-lucide="user" class="w-4 h-4 opacity-70"></i> Customer Name (Optional)</label>
                <input type="text" id="wiName" placeholder="Enter customer name" class="w-full bg-gray-50/50 border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 transition-colors">
            </div>

            <div>
                <label class="flex items-center gap-2 text-sm font-bold text-gray-900 mb-1.5"><i data-lucide="phone" class="w-4 h-4 opacity-70"></i> Phone Number (Optional)</label>
                <input type="tel" id="wiPhone" placeholder="+1-555-0000" class="w-full bg-gray-50 focus:bg-white border border-gray-100 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:border-gray-300 focus:ring-1 focus:ring-gray-300 transition-colors">
            </div>

            <div>
                <label class="flex items-center gap-2 text-sm font-bold text-gray-900 mb-1.5"><i data-lucide="users" class="w-4 h-4 opacity-70"></i> Number of Guests <span class="text-red-500">*</span></label>
                <input type="number" id="wiGuests" min="1" required placeholder="Enter number of guests" class="w-full bg-gray-50 focus:bg-white border border-gray-100 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:border-gray-300 focus:ring-1 focus:ring-gray-300 transition-colors">
                <p class="text-[12px] text-gray-500 font-medium mt-1.5" id="modalCapacityErr">Maximum capacity: X guests</p>
            </div>

            <div>
                <label class="flex items-center gap-2 text-sm font-bold text-gray-900 mb-1.5"><i data-lucide="clock" class="w-4 h-4 opacity-70"></i> Expected Duration (hours)</label>
                <select id="wiDuration" class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:border-gray-500 transition-colors">
                    <option value="1">1 hour</option>
                    <option value="2" selected>2 hours</option>
                    <option value="3">3 hours</option>
                </select>
            </div>

            <div>
                <label class="flex items-center gap-2 text-sm font-bold text-gray-900 mb-1.5">Special Requests (Optional)</label>
                <textarea id="wiNotes" rows="2" placeholder="Any special requests or notes..." class="w-full bg-gray-50 focus:bg-white border border-gray-100 rounded-lg px-3.5 py-2.5 text-sm resize-none focus:outline-none focus:border-gray-300 focus:ring-1 focus:ring-gray-300 transition-colors"></textarea>
            </div>

            <div class="pt-4 flex justify-end gap-3 w-full">
                <button type="button" onclick="closeAssignModal()" class="px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-[#0A0F1C] hover:bg-black text-white rounded-lg text-sm font-bold transition-colors shadow-sm">Assign & Seat Customer</button>
            </div>
        </form>
    </div>
</div>

<style>
    .animate-fade-in-up { animation: fadeInUp 0.2s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
