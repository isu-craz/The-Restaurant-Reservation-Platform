<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestaurantHub | Auth</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen w-full bg-gray-50 flex flex-col">

    <!-- Navbar -->
    <nav class="w-full bg-white border-b border-gray-200 px-8 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo and Name -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center shadow-sm">
                    <!-- Originally ChefHat, mapped to utensils -->
                    <i data-lucide="utensils" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-gray-900 font-bold">RestaurantHub</h1>
                    <p class="text-gray-500 text-xs">Table Reservation System</p>
                </div>
            </div>

            <!-- Portal Status Badge -->
            <div id="navToggle" class="flex items-center gap-2 text-orange-600 text-sm font-bold bg-orange-50 px-3 py-1.5 rounded-full border border-orange-200">
                <i id="navIcon" data-lucide="user" class="w-4 h-4"></i>
                <span id="navText">Customer Portal</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-1 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
                
                <!-- Header -->
                <div class="text-center mb-8">
                    <h2 id="cardTitle" class="text-gray-900 text-3xl mb-2 font-bold">Log In</h2>
                    <p id="cardSub" class="text-gray-500">Welcome back! Please enter your details</p>
                </div>

                <!-- Staff Role Selection (Hidden by default) -->
                <div id="staffRoleSelector" class="hidden mb-6">
                    <label class="block text-gray-700 text-sm mb-3 font-semibold">Select Role</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="btnWaiter" onclick="selectRole('waiter')" class="p-3 rounded-lg border border-orange-500 bg-orange-50 text-orange-700 transition-all flex items-center justify-center gap-2 font-medium">
                            <i data-lucide="utensils" class="w-4 h-4"></i>
                            <span class="text-sm">Waiter</span>
                        </button>
                        <button type="button" id="btnAdmin" onclick="selectRole('admin')" class="p-3 rounded-lg border border-gray-200 text-gray-600 hover:border-gray-300 transition-all flex items-center justify-center gap-2 font-medium">
                            <i data-lucide="shield" class="w-4 h-4"></i>
                            <span class="text-sm">Super Admin</span>
                        </button>
                    </div>
                </div>

                <!-- Hidden Input for Spring Boot -->
                <input type="hidden" name="userRole" id="userRole" value="CUSTOMER">

                <!-- Form -->
                <form class="space-y-4" onsubmit="handleDemoLogin(event)">
                    
                    <!-- Signup Fields (Hidden by default) -->
                    <div id="signupFields" class="hidden space-y-4">
                        <div>
                            <label class="block text-gray-700 text-sm mb-2 font-medium">Full Name</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                                <input type="text" placeholder="John Doe" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                            </div>
                        </div>

                        <div>
                            <label class="block text-gray-700 text-sm mb-2 font-medium">Phone Number</label>
                            <input type="tel" placeholder="+1 (555) 000-0000" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label class="block text-gray-700 text-sm mb-2 font-medium">Email address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="email" placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all" required>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label class="block text-gray-700 text-sm mb-2 font-medium">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="password" placeholder="••••••••" class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all" required>
                        </div>
                    </div>

                    <!-- Login Extras (Hidden on Signup) -->
                    <div id="loginExtras" class="flex items-center justify-between pt-1 pb-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500">
                            <span class="text-gray-600 text-sm font-medium">Remember me</span>
                        </label>
                        <button type="button" class="text-orange-600 hover:text-orange-700 transition-colors text-sm font-medium">
                            Forgot password?
                        </button>
                    </div>

                    <!-- Submit Button -->
                    <button id="submitBtn" type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-lg hover:from-orange-600 hover:to-red-600 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 flex items-center justify-center gap-2 font-bold mt-2">
                        <span id="submitText">Log In</span>
                        <span>&rarr;</span>
                    </button>
                </form>

                <!-- NEW: Staff Message (Now placed here per user request) -->
                <div id="staffWarningMsg" class="hidden mt-6 p-4 bg-gray-50 rounded-lg">
                    <p class="text-gray-600 text-xs text-center">
                        <span class="block mb-1 font-medium">Forgot your credentials or need a new account?</span>
                        <span class="text-gray-500">Please contact your system administrator.</span>
                    </p>
                </div>

                <!-- Footer Actions -->
                <div class="mt-6 flex items-center justify-center w-full">
                    
                    <!-- Customer Auth Toggle -->
                    <div id="authBottomToggle" class="text-center">
                        <p class="text-gray-600 text-sm font-medium">
                            <span id="authToggleText">Don't have an account?</span>
                            <button type="button" onclick="toggleAuthAction()" id="authToggleBtn" class="text-orange-600 hover:text-orange-700 transition-colors font-bold ml-1">
                                Sign up
                            </button>
                        </p>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Page Footer with Global Toggle -->
    <div class="fixed bottom-6 right-8 z-50">
        <button id="bottomPortalToggleBtn" type="button" onclick="toggleStaffMode()" class="text-gray-500 hover:text-gray-900 text-sm font-semibold flex items-center gap-2 transition-colors">
            Log in as Staff member <i data-lucide="arrow-right" class="w-4 h-4 mt-0.5"></i>
        </button>
    </div>

    <!-- JavaScript logic -->
    <script>
        // Init Lucide
        lucide.createIcons();

        let isStaffMode = false;
        let isSignupMode = false;
        let selectedRole = 'waiter';

        function toggleStaffMode() {
            isStaffMode = !isStaffMode;
            
            const navToggle = document.getElementById('navToggle');
            const navText = document.getElementById('navText');
            const navIcon = document.getElementById('navIcon');
            const bottomToggleBtn = document.getElementById('bottomPortalToggleBtn');

            if (isStaffMode) {
                // Switching to Staff Mode
                navToggle.className = "flex items-center gap-2 text-orange-600 text-sm font-bold bg-orange-50 px-3 py-1.5 rounded-full border border-orange-200";
                navIcon.setAttribute('data-lucide', 'shield');
                navText.innerText = "Staff Portal";
                
                bottomToggleBtn.innerHTML = `Log in as Customer <i data-lucide="arrow-right" class="w-4 h-4 mt-0.5"></i>`;
                
                // Force Login Mode
                isSignupMode = false;
                
                // Update UI for Staff
                document.getElementById('cardTitle').innerText = "Log In";
                document.getElementById('cardSub').innerText = "Access your staff dashboard";
                document.getElementById('staffRoleSelector').classList.remove('hidden');
                document.getElementById('authBottomToggle').classList.add('hidden');
                document.getElementById('staffWarningMsg').classList.remove('hidden');
                document.getElementById('loginExtras').classList.remove('hidden');
                document.getElementById('signupFields').classList.add('hidden');
                document.getElementById('submitText').innerText = "Log In";
                
                // Initialize default role selection
                selectRole('waiter');

            } else {
                // Switching back to Customer Mode
                navToggle.className = "flex items-center gap-2 text-orange-600 text-sm font-bold bg-orange-50 px-3 py-1.5 rounded-full border border-orange-200";
                navIcon.setAttribute('data-lucide', 'user');
                navText.innerText = "Customer Portal";

                bottomToggleBtn.innerHTML = `Log in as Staff member <i data-lucide="arrow-right" class="w-4 h-4 mt-0.5"></i>`;

                // Force Login Mode
                isSignupMode = false;

                // Update UI for Customer
                document.getElementById('cardTitle').innerText = "Log In";
                document.getElementById('cardSub').innerText = "Welcome back! Please enter your details";
                document.getElementById('staffRoleSelector').classList.add('hidden');
                document.getElementById('authBottomToggle').classList.remove('hidden');
                document.getElementById('staffWarningMsg').classList.add('hidden');
                document.getElementById('loginExtras').classList.remove('hidden');
                document.getElementById('signupFields').classList.add('hidden');
                document.getElementById('submitText').innerText = "Log In";
                document.getElementById('authToggleText').innerText = "Don't have an account?";
                document.getElementById('authToggleBtn').innerText = "Sign up";

                document.getElementById('userRole').value = 'CUSTOMER';
            }
            lucide.createIcons();
        }

        function toggleAuthAction() {
            isSignupMode = !isSignupMode;

            if (isSignupMode) {
                document.getElementById('cardTitle').innerText = "Create Account";
                document.getElementById('cardSub').innerText = "Join our platform today";
                document.getElementById('signupFields').classList.remove('hidden');
                document.getElementById('loginExtras').classList.add('hidden');
                document.getElementById('submitText').innerText = "Create Account";
                
                document.getElementById('authToggleText').innerText = "Already have an account?";
                document.getElementById('authToggleBtn').innerText = "Log in";
            } else {
                document.getElementById('cardTitle').innerText = "Log In";
                document.getElementById('cardSub').innerText = "Welcome back! Please enter your details";
                document.getElementById('signupFields').classList.add('hidden');
                document.getElementById('loginExtras').classList.remove('hidden');
                document.getElementById('submitText').innerText = "Log In";
                
                document.getElementById('authToggleText').innerText = "Don't have an account?";
                document.getElementById('authToggleBtn').innerText = "Sign up";
            }
        }

        function selectRole(role) {
            const btnWaiter = document.getElementById('btnWaiter');
            const btnAdmin = document.getElementById('btnAdmin');

            btnWaiter.className = "p-3 rounded-lg border border-gray-200 text-gray-600 hover:border-gray-300 transition-all flex items-center justify-center gap-2 font-medium";
            btnAdmin.className = "p-3 rounded-lg border border-gray-200 text-gray-600 hover:border-gray-300 transition-all flex items-center justify-center gap-2 font-medium";

            if (role === 'waiter') {
                btnWaiter.className = "p-3 rounded-lg border border-orange-500 bg-orange-50 text-orange-700 transition-all flex items-center justify-center gap-2 font-bold";
                document.getElementById('userRole').value = 'WAITER';
            } else {
                btnAdmin.className = "p-3 rounded-lg border border-orange-500 bg-orange-50 text-orange-700 transition-all flex items-center justify-center gap-2 font-bold";
                document.getElementById('userRole').value = 'ADMIN';
            }
        }

        // Prototype Routing Logic
        function handleDemoLogin(e) {
            e.preventDefault(); 
            const role = document.getElementById('userRole').value;
            
            // Provide a tiny visual delay for realism
            document.getElementById('submitText').innerText = "Authenticating...";
            
            setTimeout(() => {
                if (role === 'WAITER') {
                    window.location.href = 'waiter-dashboard.html';
                } else if (role === 'ADMIN') {
                    window.location.href = 'admin-table-grid.html';
                } else {
                    window.location.href = 'customer-booking.html';
                }
            }, 600);
        }
    </script>
</body>
</html>
